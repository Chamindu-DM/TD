name: Build and push to docker hub

# trigger
on:
  push:
    #tells github to only run this workflow when a Git tag starting with "v" is pushed.
    # Example: git tag v1.0.0 && git push origin v1.0.0
    tags:
      - 'v*.*.*'

# jobs
jobs:
  build-and-push:
    # use a standard Ubuntu Linus server to run tasks
    runs-on: ubuntu-latest

    steps:
      # 1.download code onto github ubuntu server
      - name: Check out the repository
        uses: actions/checkout@v4
      
      #2. setup docker buildx(A tool that helps build docker images faster)
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3
      
      #3. Log in to Docker hub using the secrets
      - name: Log in to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD}}
      
      #4. extract the git tag to use as the Docker tag
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME}}/td-backend
            ${{ secrets.DOCKER_USERNAME}}/td-frontend

      #5. Build the Backend dockerfile and push it
      - name: Build and push Backend images
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # uses the git tag
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/td-backend:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/td-backend:latest
      
      #6. build the frontend dockerfile and push it
      - name: Build and push Frontend images
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=https://chamindu-todo-api.duckdns.org
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/td-frontend:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/td-frontend:latest

      # 7. Automatically Deploy to AWS EC2
      - name: Deploy to AWS Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_IP }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd todo-app
            docker compose pull
            docker compose up -d
